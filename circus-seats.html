<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','メイリオ',sans-serif;background:#f0f2f5;color:#333}

/* ── ログイン ── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;background:radial-gradient(ellipse at 60% 40%,#2a4a8a,#1a2f5a 50%,#0d1a33)}
.login-logo{font-size:4rem;margin-bottom:12px}
.login-title{color:#FFD700;font-size:1.9rem;font-weight:bold;margin-bottom:6px}
.login-sub{color:#8aa4d4;margin-bottom:40px;font-size:.95rem}
#btn-login{background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a2f5a;border:none;
  padding:14px 48px;font-size:1.05rem;font-weight:bold;border-radius:50px;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 24px #FFD70055;transition:transform .15s}
#btn-login:hover{transform:translateY(-2px)}

/* ── アプリ ── */
#app-screen{display:none;min-height:100vh}
header{background:linear-gradient(90deg,#1a2f5a,#2a4a8a);color:white;padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);position:sticky;top:0;z-index:100}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:1rem;font-weight:bold;color:#FFD700}
.hdr-right{display:flex;align-items:center;gap:14px;font-size:.88rem;color:#8aa4d4}
#btn-logout{background:transparent;border:1px solid rgba(255,255,255,.25);color:white;
  padding:5px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:.82rem}
#btn-logout:hover{background:rgba(255,255,255,.12)}

/* ── タブ ── */
#tab-nav{background:white;border-bottom:2px solid #e8eaf0;display:flex;padding:0 20px}
.tab-btn{padding:12px 24px;border:none;background:transparent;font-family:inherit;
  font-size:.92rem;cursor:pointer;color:#666;border-bottom:3px solid transparent;
  margin-bottom:-2px;transition:color .15s,border-color .15s}
.tab-btn.active{color:#1a2f5a;border-bottom-color:#1a2f5a;font-weight:bold}

/* ── コントロール ── */
#controls{background:white;padding:12px 20px;border-bottom:1px solid #e0e4f0;

.ctrl-label{font-size:.82rem;font-weight:bold;color:#5a6a8a}
#show-select{padding:8px 14px;border:2px solid #2a4a8a;border-radius:8px;

#btn-refresh{background:#2a4a8a;color:white;border:none;padding:8px 18px;border-radius:8px;
  cursor:pointer;font-family:inherit;font-size:.88rem}
#btn-refresh:hover{background:#1a2f5a}
#stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{padding:5px 14px;border-radius:16px;font-size:.82rem;font-weight:bold}
.st-ss {background:#FFF8DC;color:#8B6914;border:1px solid #FFE58A}
.st-s  {background:#F0FFF0;color:#2E7D32;border:1px solid #A5D6A7}
.st-box{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.st-tot{background:#1a2f5a;color:white}

/* ── 座席マップ ── */
#seat-map-panel{display:block}
#search-panel{display:none;padding:24px 20px}
#seat-map{padding:20px;overflow-x:auto}
.map-inner{min-width:980px}
.stage-bar{background:linear-gradient(135deg,#FFD700,#FFA500);color:#3E1C00;
  text-align:center;padding:13px;font-size:1.1rem;font-weight:bold;border-radius:10px;

.section-title{display:flex;align-items:center;gap:8px;margin:18px 0 8px}
.section-title span{background:#1a2f5a;color:white;padding:5px 16px;border-radius:20px;

.section-title hr{flex:1;border:none;border-top:1px solid #ddd}
.block-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.block{background:white;border:1px solid #e0e4f0;border-radius:10px;padding:10px;

.block-name.ktn-s  {color:#2E7D32}
.block-name.ktn-box{color:#E65100}
.block-name.pg     {color:#6D28D9}

/* ── 座席ボタン ── */
.seat{width:40px;height:40px;border-radius:5px;font-size:.65rem;display:flex;

.seat.avail-s  {background:#F1F8E9;color:#33691E;border:2px solid #7CB342}
.seat.avail-box{background:#FFF3E0;color:#BF360C;border:2px solid #FB8C00}
/* 販売済 */
.seat.sold {background:#E8F5E9;color:#1B5E20;font-size:.58rem;border:2px solid #66BB6A}
/* PG空席 */
.seat.pg-avail{background:#EDE9FE;color:#5B21B6;border:1px dashed #7C3AED}
/* PG配分済 */
.seat.pg-set  {background:#DDD6FE;color:#4C1D95;border:1px solid #7C3AED;font-size:.6rem}
/* 取消選択中 */

/* PG個別販売済 */
.seat.pg-sold {background:#C4B5FD;color:#2D1B69;border:1px solid #5B21B6;font-size:.58rem}
/* 複数選択 */

/* ── 複数選択バー ── */

.pg-note{background:#EDE9FE;border:1px solid #C4B5FD;border-radius:8px;

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.82rem;font-weight:bold;color:#444;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 13px;border:2px solid #e0e0e0;

.form-group input:focus,.form-group select:focus{outline:none;border-color:#2a4a8a}
.hint{font-size:.73rem;color:#999;margin-top:3px}
.sold-card{background:#F1F8FF;border:1px solid #BBDEFB;border-radius:10px;padding:14px;margin-bottom:14px}

.pg-card{background:#F5F3FF;border:1px solid #C4B5FD;border-radius:10px;padding:14px;margin-bottom:14px}
.pg-card p{font-size:.88rem;color:#5B21B6;margin-bottom:6px}
.modal-btns{display:flex;gap:10px;margin-top:18px}
#btn-save{flex:1;background:linear-gradient(135deg,#1a2f5a,#2a4a8a);color:white;border:none;

.err{color:#C62828;font-size:.82rem;margin-top:8px;min-height:18px}

/* ── 検索パネル ── */
.search-box{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 6px rgba(0,0,0,.08);
  margin-bottom:20px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}

#btn-search{background:#1a2f5a;color:white;border:none;padding:10px 28px;

#loading{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);

  font-size:.95rem;z-index:1000;box-shadow:0 4px 24px rgba(0,0,0,.4)}
</style>

<script>
// ─────────────────────────────────────────────
//  設定（ここを変更してください）
// ─────────────────────────────────────────────
const CLIENT_ID = '83a913fd-37c9-4b45-993a-c8777f55c0b2';
const TENANT_ID = '0bd1b308-c26d-49bb-acbd-86dd168984f6';
const SP_HOST   = 'ktno365.sharepoint.com';
const SP_SITE   = 'circus2026';
const LIST_NAME = '座席販売管理';

// PG席のデフォルト値（変更可能）
const PG_CONFIG = {
  buyerName: 'PG',
  tel:       '0123',
  staff:     'システム',
};

// ─────────────────────────────────────────────
//  内部定数
// ─────────────────────────────────────────────
const SITE_PATH = SP_HOST + ':/sites/' + SP_SITE + ':';
const LIST_URL  = 'https://graph.microsoft.com/v1.0/sites/' + SITE_PATH + '/lists/' + encodeURIComponent(LIST_NAME);
const msalCfg = {
  auth:{
    clientId: CLIENT_ID,
    authority:'https://login.microsoftonline.com/' + TENANT_ID,
    redirectUri: window.location.origin + window.location.pathname,
  },
  cache:{cacheLocation:'sessionStorage'}
};
const SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All'];
const WD = ['日','月','火','水','木','金','土'];

// ─────────────────────────────────────────────
//  公演リスト（2026/11/21〜2027/1/31）
// ─────────────────────────────────────────────
const SHOWS = (function(){
  var list = [];
  var e = new Date(2027,0,31);
  for(var d = new Date(2026,10,21); d <= e; d.setDate(d.getDate()+1)){
    var wd = d.getDay();
    var ds = d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    var lb = p2(d.getMonth()+1)+'/'+p2(d.getDate())+'('+WD[wd]+')';
    if(wd===5){ list.push({id:ds+'-1900',label:lb+' 19:00'}); }
    else if(wd===6||wd===0){
      list.push({id:ds+'-1400',label:lb+' 14:00'});
      list.push({id:ds+'-1800',label:lb+' 18:00'});
    }
  }
  return list;
})();
function p2(n){return String(n).padStart(2,'0');}
function p3(n){return String(n).padStart(3,'0');}
function rng(s,e){return Array.from({length:e-s+1},function(_,i){return s+i;});}
// XSS対策：innerHTMLに差し込む前に必ずエスケープする
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ─────────────────────────────────────────────
//  座席定義（全席）
//  role: 'ktn'=自社販売枠  'pg'=プレイガイド枠
//  会場レイアウト順（左→右）：き/お/え/BOX/い/う/あ/か
// ─────────────────────────────────────────────
var BLOCKS = [
  // BOX（ステージ最前方）
  {id:'BOX_F', label:'前列 1〜10番（KTN）',  type:'box', role:'ktn', seats:rng(1,10),  pr:10},
  {id:'BOX_N1',label:'11〜20番（PG）',        type:'box', role:'pg',  seats:rng(11,20), pr:10},
  {id:'BOX_R', label:'後列 21〜30番（KTN）',  type:'box', role:'ktn', seats:rng(21,30), pr:10},

function getSeatId(blk,num){
  if(blk.id.startsWith('BOX')) return 'BOX-'+p3(num);
  var pre = blk.id.startsWith('S_') ? 'S' : 'SS';
  return pre+'-'+blk.pfx+'-'+p3(num);
}
function getSeatType(blk){
  if(blk.id.startsWith('BOX')) return 'BOX席';
  if(blk.id.startsWith('S_'))  return 'S席';
  return 'SS席';
}

// ─────────────────────────────────────────────
//  MSAL（遅延初期化）
// ─────────────────────────────────────────────
async function getMsal(){
  if(msalInstance) return msalInstance;
  var waited = 0;
  while(typeof msal === 'undefined' && waited < 60){
    await new Promise(function(r){setTimeout(r,100);});
    waited++;
  }
  if(typeof msal === 'undefined'){
    throw new Error('MSALライブラリが読み込めません。ページを更新してください。');
  }
  msalInstance = new msal.PublicClientApplication(msalCfg);
  await msalInstance.initialize();
  return msalInstance;
}

async function login(){
  var errEl = document.getElementById('login-err');
  errEl.textContent = 'ログイン処理中ばい...';
  try{
    var inst = await getMsal();
    var r = await inst.loginPopup({scopes:SCOPES});
    account = r.account;
    errEl.textContent = '';
    onLoggedIn();
  }catch(e){
    if(e.message && e.message.includes('user_cancelled')){
      errEl.textContent = '';
    }else if(e.message && e.message.includes('popup_window_error')){
      errEl.textContent = 'ポップアップがブロックされました。ブラウザのアドレスバーのポップアップ許可をクリックして再試行してください。';
    }else{
      errEl.textContent = 'エラー: ' + (e.message || String(e));
    }
  }
}

function logout(){
  if(msalInstance) msalInstance.logoutPopup({account:account});
}

async function getToken(){
  var inst = await getMsal();
  try{
    return (await inst.acquireTokenSilent({scopes:SCOPES,account:account})).accessToken;
  }catch(e){
    return (await inst.acquireTokenPopup({scopes:SCOPES})).accessToken;
  }
}

async function graph(url,method,body){
  method = method||'GET'; body = body||null;
  var tok = await getToken();
  var opt = {
    method:method,
    headers:{
      'Authorization':'Bearer '+tok,
      'Content-Type':'application/json',
      'Prefer':'HonorNonIndexedQueriesWarningMayFailRandomly'
    }
  };
  if(body) opt.body = JSON.stringify(body);
  var res = await fetch(url,opt);
  if(!res.ok){
    var t = await res.text();
    throw new Error('GraphAPI '+res.status+': '+t);
  }
  if(method==='DELETE') return null;
  return res.json();
}

async function onLoggedIn(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-name').textContent = account.name;
  showLoad('初期化中...ちょっとまっとかんね...');
  try{
    await loadColumns();
    buildShowSel();
    buildStaffSel();
  }catch(e){
    alert('初期化エラー: '+e.message);
  }finally{
    hideLoad();
  }
}

// 列情報取得（旧：loadColMap+loadStaffの2回呼び出しを1回に統合）
async function loadColumns(){
  var res = await graph(LIST_URL+'/columns');
  colMap = {};
  staffList = [];
  for(var i=0;i<res.value.length;i++){
    var c = res.value[i];
    colMap[c.displayName] = c.name;
    if(c.displayName==='受付'||c.displayName.includes('受付')){
      if(c.choice && c.choice.choices) staffList = c.choice.choices;
    }
  }
}

function buildShowSel(){
  var sel = document.getElementById('show-select');
  for(var i=0;i<SHOWS.length;i++){
    var o = document.createElement('option');
    o.value = SHOWS[i].id;
    o.textContent = SHOWS[i].label;
    sel.appendChild(o);
  }
}

function buildStaffSel(){
  var sel = document.getElementById('sel-staff');
  // 既存のoptionを残しつつ追加
  if(staffList.length===0) return;
  for(var i=0;i<staffList.length;i++){
    var o = document.createElement('option');
    o.value = staffList[i];
    o.textContent = staffList[i];
    sel.appendChild(o);
  }
  // PG_CONFIGの受付がリストにない場合追加
  var found = false;
  for(var i=0;i<staffList.length;i++){
    if(staffList[i]===PG_CONFIG.staff){found=true;break;}
  }
  if(!found){
    var o = document.createElement('option');
    o.value = PG_CONFIG.staff;
    o.textContent = PG_CONFIG.staff;
    sel.appendChild(o);
  }
}

async function onShowChange(){
  showId = document.getElementById('show-select').value;
  if(!showId) return;
  selectedSeats.clear();
  updateSelBar();
  await loadSeatData();
}

async function loadSeatData(){
  if(!showId) return;
  showLoad('座席データ読み込み中...');
  try{
    var fld = colMap['公演ID']||'公演ID';
    var url = LIST_URL+'/items?$expand=fields&$filter=fields/'+fld+' eq \''+showId+'\'&$top=500';
    var res = await graph(url);
    soldMap = {};
    for(var i=0;i<res.value.length;i++){
      var item = res.value[i];
      var f = item.fields;
      var sid = f[colMap['座席ID']||'座席ID'];
      if(sid){
        soldMap[sid] = {
          name:   f[colMap['購入者名']||'購入者名']||'',
          tel:    f[colMap['電話番号'] ||'電話番号'] ||'',
          staff:  f[colMap['受付']     ||'受付']     ||'',
          memo:   f[colMap['メモ']      ||'メモ']      ||'',
          itemId: item.id
        };
      }
    }
    renderMap();
    updateStats();
  }catch(e){
    alert('読み込みエラー: '+e.message);
  }finally{
    hideLoad();
  }
}

function renderMap(){
  var wrap = document.getElementById('map-inner');
  wrap.innerHTML = '';

  var stg = document.createElement('div');
  stg.className = 'stage-bar';
  stg.textContent = '◆  ステージ  ◆';
  wrap.appendChild(stg);

  var SECS = [
    {title:'🟠 BOX指定席', bids:['BOX_F','BOX_N1','BOX_R','BOX_N2']},
    {title:'🟡 SS指定席（左→右：お・え・い・う・あ）', bids:['SS_OH','SS_E','SS_I','SS_U','SS_A']},
    {title:'🟢 S指定席', bids:['S_KI','S_KA']},
  ];

  for(var s=0;s<SECS.length;s++){
    var sec = SECS[s];
    var ti = document.createElement('div');
    ti.className = 'section-title';
    ti.innerHTML = '<hr><span>'+sec.title+'</span><hr>';
    wrap.appendChild(ti);
    var row = document.createElement('div');
    row.className = 'block-row';
    for(var b=0;b<sec.bids.length;b++){
      var blk = null;
      for(var k=0;k<BLOCKS.length;k++){if(BLOCKS[k].id===sec.bids[b]){blk=BLOCKS[k];break;}}
      if(blk) row.appendChild(renderBlock(blk));
    }
    wrap.appendChild(row);
  }
}

function renderBlock(blk){
  var div = document.createElement('div');
  div.className = 'block';
  var h = document.createElement('div');
  var cls = blk.role==='pg' ? 'pg' : ('ktn-'+blk.type);
  h.className = 'block-name '+cls;
  h.textContent = blk.label;
  div.appendChild(h);
  var grid = document.createElement('div');
  grid.className = 'seat-grid';
  grid.style.gridTemplateColumns = 'repeat('+blk.pr+',40px)';
  for(var i=0;i<blk.seats.length;i++){
    var num = blk.seats[i];
    var sid = getSeatId(blk,num);
    var btn = document.createElement('button');
    btn.dataset.sid = sid;
    btn.dataset.num = String(num);

    // 選択状態を確認
    var selInfo = selectedSeats.get(sid);
    if(selInfo){
      // 選択中（登録待ち or 取消待ち）
      btn.className = selInfo.mode==='cancel' ? 'seat sel-cancel' : 'seat selected';
      btn.textContent = selInfo.mode==='cancel' ? '✕' : '✓';
      (function(b_,num_,sid_,btn_){
        btn_.onclick = function(){toggleAny(b_,num_,sid_,btn_);};
      })(blk,num,sid,btn);
    } else if(blk.role==='ktn'){
      if(soldMap[sid]){
        btn.className = 'seat sold';
        btn.textContent = soldMap[sid].name;
        btn.title = sid+': '+soldMap[sid].name;
        (function(b_,num_,sid_,btn_){
          btn_.onclick = function(){toggleAny(b_,num_,sid_,btn_);};
        })(blk,num,sid,btn);
      } else {
        btn.className = 'seat avail-'+blk.type;
        btn.textContent = num;
        btn.title = sid+'（空席）';
        (function(b_,num_,sid_,btn_){
          btn_.onclick = function(){toggleAny(b_,num_,sid_,btn_);};
        })(blk,num,sid,btn);
      }
    } else {
      // PG席：状態判定
      var pgInfo    = soldMap[sid];
      var isPgAlloc  = !pgInfo || pgInfo.name===PG_CONFIG.buyerName;
      var isReturned = pgInfo && pgInfo.name==='返却済';

      if(isPgAlloc){
        // PG配分済（紫・予約済み見た目）
        btn.className = 'seat pg-set';
        btn.textContent = 'PG';
        btn.title = sid+'（PG配分済）';
        (function(b_,num_,sid_,btn_){
          btn_.onclick = function(){
            if(cancelMode){
              // 取消モード：PG配分済みを返却済みリストへ
              if(selectedSeats.has(sid_)){
                selectedSeats.delete(sid_);
                btn_.className='seat pg-set'; btn_.textContent='PG';
                updateSelBar();
              } else {
                var hasOther=false;
                selectedSeats.forEach(function(v){if(v.mode==='reg'||v.mode==='cancel') hasOther=true;});
                if(hasOther){
                  alert('登録待ち・取消待ちの席とPG返却待ちの席を同時に選択できません。 一度「解除」してからやり直してください。');
                  return;
                }
                selectedSeats.set(sid_,{blk:b_,num:num_,sid:sid_,mode:'pg-return'});
                btn_.className='seat sel-cancel'; btn_.textContent='✕';
                updateSelBar();
              }
            } else {
              openPgAllocModal(b_,num_,sid_);
            }
          };
        })(blk,num,sid,btn);
      } else if(isReturned){
        // 返却済→自社販売可（KTN空席と同じ見た目）
        btn.className = 'seat avail-'+blk.type;
        btn.textContent = num;
        btn.title = sid+'（返却済・自社販売可）';
        (function(b_,num_,sid_,btn_){
          btn_.onclick = function(){toggleAny(b_,num_,sid_,btn_);};
        })(blk,num,sid,btn);
      } else {
        // 個人購入済（緑、KTN統計外）
        btn.className = 'seat sold';
        btn.textContent = pgInfo.name;
        btn.title = sid+': '+pgInfo.name+'（PG席・個人購入）';
        (function(b_,num_,sid_,btn_){
          btn_.onclick = function(){toggleAny(b_,num_,sid_,btn_);};
        })(blk,num,sid,btn);
      }
    }
    grid.appendChild(btn);
  }
  div.appendChild(grid);
  return div;
}

function updateStats(){
  var ss=0,sS=0,box=0,ssSold=0,sSold=0,boxSold=0,pgIndSold=0;
  for(var k=0;k<BLOCKS.length;k++){
    var blk=BLOCKS[k];
    for(var i=0;i<blk.seats.length;i++){
      var sid=getSeatId(blk,blk.seats[i]);
      var info=soldMap[sid];
      if(blk.role==='ktn'){
        // KTN枠のみカウント
        if(blk.id.startsWith('SS')){ss++;if(info&&info.name!=='返却済')ssSold++;}
        else if(blk.id.startsWith('S_')){sS++;if(info&&info.name!=='返却済')sSold++;}
        else{box++;if(info&&info.name!=='返却済')boxSold++;}
      } else {
        // PG席：個人購入済みのみ別カウント（返却済・PG配分除外）
        if(info&&info.name!=='返却済'&&info.name!==PG_CONFIG.buyerName) pgIndSold++;
      }
    }
  }
  document.getElementById('stat-ss') .textContent='SS: '+ssSold+'/'+ss;
  document.getElementById('stat-s')  .textContent='S: '+sSold+'/'+sS;
  document.getElementById('stat-box').textContent='BOX: '+boxSold+'/'+box;
  document.getElementById('stat-tot').textContent='KTN: '+(ssSold+sSold+boxSold)+'/215'+(pgIndSold>0?' PG返却→販売:'+pgIndSold:'');
}

// ─────────────────────────────────────────────
//  複数選択（KTNのみ）
// ─────────────────────────────────────────────
function toggleAny(blk,num,sid,btn){
  if(selectedSeats.has(sid)){
    // 選択解除
    selectedSeats.delete(sid);
    var isSold = !!soldMap[sid];
    if(blk.role==='pg'){
      var info=soldMap[sid];
      if(!info || info.name===PG_CONFIG.buyerName){
        // 配分エントリなし、または明示的にPG配分済み
        btn.className='seat pg-set'; btn.textContent='PG';
      } else if(info.name==='返却済'){
        // 返却済＝自社販売可（KTN空席と同じ見た目）
        btn.className='seat avail-'+blk.type; btn.textContent=num;
      } else {
        // 個人購入済
        btn.className='seat pg-sold'; btn.textContent=info.name;
      }
    } else {
      if(soldMap[sid]){
        btn.className='seat sold';
        btn.textContent=soldMap[sid].name;
      } else {
        btn.className='seat avail-'+blk.type;
        btn.textContent=num;
      }
    }
    updateSelBar();
    return;
  }
  // 返却済PG席は空席として扱う
  var isReturnedPg = soldMap[sid] && soldMap[sid].name==='返却済';
  // 取消モードON + 販売済み → 直接取消選択
  if(cancelMode && soldMap[sid] && !isReturnedPg){
    var hasReg2=false, hasPgReturn2=false;
    selectedSeats.forEach(function(v){if(v.mode==='reg') hasReg2=true; if(v.mode==='pg-return') hasPgReturn2=true;});
    if(hasReg2||hasPgReturn2){alert('登録待ち・返却待ちの席と取消待ちの席を同時に選択できません。 一度「解除」してからやり直してください。');return;}
    selectedSeats.set(sid,{blk:blk,num:num,sid:sid,mode:'cancel'});
    btn.className='seat sel-cancel'; btn.textContent='✕';
    updateSelBar(); return;
  }
  // 販売済み（返却済以外）はまず情報モーダル表示
  if(soldMap[sid] && !isReturnedPg){
    openSoldModalWithAction(blk,num,sid);
    return;
  }
  // 空席は登録選択
  var hasCancel=false, hasPgReturn=false;
  selectedSeats.forEach(function(v){if(v.mode==='cancel') hasCancel=true; if(v.mode==='pg-return') hasPgReturn=true;});
  if(hasCancel||hasPgReturn){
    alert('取消待ち・返却待ちの席と登録待ちの席を同時に選択できません。 一度「解除」してからやり直してください。');
    return;
  }
  selectedSeats.set(sid,{blk:blk,num:num,sid:sid,mode:'reg'});
  btn.className = 'seat selected';
  btn.textContent = '✓';
  updateSelBar();
}

function toggleCancelMode(){
  cancelMode = !cancelMode;
  var btn = document.getElementById('btn-cancel-mode');
  if(cancelMode){
    btn.style.background='#C62828'; btn.style.color='white';
    btn.style.border='1px solid #C62828';
    btn.textContent='🗑 取消モード ON';
    // 登録待ちがあればクリア
    var hasReg=false;
    selectedSeats.forEach(function(v){if(v.mode==='reg') hasReg=true;});
    if(hasReg){selectedSeats.clear();updateSelBar();if(showId)renderMap();}
  } else {
    btn.style.background='#f5f5f5'; btn.style.color='#444';
    btn.style.border='1px solid #ddd';
    btn.textContent='🗑 取消モード OFF';
  }
}

function updateSelBar(){
  var bar = document.getElementById('sel-bar');
  var n = selectedSeats.size;
  if(n===0){
    bar.classList.remove('open');
    document.body.classList.remove('sel-open');
    return;
  }
  bar.classList.add('open');
  document.body.classList.add('sel-open');
  var hasReg=false, hasCancel=false, hasPgReturn=false;
  var regN=0, cancelN=0, pgReturnN=0;
  var ids=[];
  selectedSeats.forEach(function(v){
    ids.push(v.sid);
    if(v.mode==='cancel'){hasCancel=true;cancelN++;}
    else if(v.mode==='pg-return'){hasPgReturn=true;pgReturnN++;}
    else{hasReg=true;regN++;}
  });
  var label = '';
  if(hasReg&&!hasCancel&&!hasPgReturn) label=regN+'席選択中（登録待ち）';
  else if(hasCancel&&!hasReg&&!hasPgReturn) label=cancelN+'席選択中（取消待ち）';
  else if(hasPgReturn&&!hasReg&&!hasCancel) label=pgReturnN+'席選択中（PG返却待ち）';
  else label=n+'席選択中';
  document.getElementById('sel-bar-info').textContent = label;
  document.getElementById('sel-bar-seats').textContent = ids.join('、');
  document.getElementById('btn-sel-ok').style.display = hasReg?'inline-block':'none';
  document.getElementById('btn-sel-cancel-all').style.display = hasCancel?'inline-block':'none';
  var pgRetBtn=document.getElementById('btn-sel-pg-return');
  if(pgRetBtn) pgRetBtn.style.display = hasPgReturn?'inline-block':'none';
}

function clearSelection(){
  selectedSeats.clear();
  document.body.classList.remove('sel-open');
  updateSelBar();
  if(showId) renderMap();
}

function openMultiModal(){
  if(selectedSeats.size===0) return;
  selSeat = null;

function openPgAllocModal(blk,num,sid){
  selSeat = {blk:blk,num:num,sid:sid,isPg:true};
  var show=null;
  for(var i=0;i<SHOWS.length;i++){if(SHOWS[i].id===showId){show=SHOWS[i];break;}}
  document.getElementById('modal-title').textContent = 'PG配分済み席';
  document.getElementById('modal-info').textContent = (show?show.label:'')+'｜'+sid;
  document.getElementById('sold-card-wrap').innerHTML =
    '<div class="pg-card">'
    +'<p><strong>状態：</strong>プレイガイドに配分済み</p>'
    +'<p style="font-size:.8rem;color:#888;margin-top:6px">返却後は「返却済みにする」で自社販売枠に変更できます</p>'
    +'</div>';
  // 返却済みボタンの設定
  var addCancelBtn=document.getElementById('btn-add-cancel');
  addCancelBtn.style.display='block';
  addCancelBtn.style.width='100%';
  addCancelBtn.style.padding='12px';
  addCancelBtn.style.marginBottom='8px';
  addCancelBtn.style.borderRadius='8px';
  addCancelBtn.style.fontSize='.95rem';
  addCancelBtn.style.cursor='pointer';
  addCancelBtn.style.fontFamily='inherit';
  addCancelBtn.style.fontWeight='bold';
  addCancelBtn.style.background='#DBEAFE';
  addCancelBtn.style.color='#1D4ED8';
  addCancelBtn.style.border='2px solid #93C5FD';
  addCancelBtn.textContent='📦 返却済みにする（自社販売枠に変更）';
  addCancelBtn.onclick=function(){markAsReturned();};
  // 「今すぐ取り消す」は非表示
  document.getElementById('btn-delete').style.display='none';
  document.getElementById('form-new').style.display='none';
  document.getElementById('form-sold').style.display='block';
  document.getElementById('modal-overlay').classList.add('open');
}

async function markAsReturned(){
  if(!selSeat) return;
  showLoad('最新状態を確認中...');
  try{
    // 同時編集対策：直前にサーバーの最新itemIdを再取得してから更新
    var latest = await fetchLatestSoldMap();
    var cur = latest[selSeat.sid];
    showLoad('返却済みに変更中...');
    var READONLY=['Author','Editor','Created','Modified','ID','GUID','ContentType'];
    function setR(f,k,v){var n=colMap[k]||k;if(READONLY.indexOf(n)<0)f[n]=v;}
    var f={Title:showId+'-'+selSeat.sid};
    setR(f,'公演ID',showId); setR(f,'座席ID',selSeat.sid);
    setR(f,'購入者名','返却済'); setR(f,'電話番号','');
    setR(f,'席種',getSeatType(selSeat.blk)); setR(f,'受付','システム');
    if(cur){
      await graph(LIST_URL+'/items/'+cur.itemId,'PATCH',{fields:f});
    } else {
      await graph(LIST_URL+'/items','POST',{fields:f});
    }
    closeModal(); await loadSeatData();
  }catch(e){alert('エラー: '+e.message);}
  finally{hideLoad();}
}

// ─────────────────────────────────────────────
//  モーダル（販売済み確認＋取消追加）
// ─────────────────────────────────────────────
function openSoldModalWithAction(blk,num,sid){
  var isPg = blk.role==='pg';
  selSeat = {blk:blk,num:num,sid:sid,isPg:isPg};
  var info = soldMap[sid];
  var show = null;
  for(var i=0;i<SHOWS.length;i++){if(SHOWS[i].id===showId){show=SHOWS[i];break;}}
  document.getElementById('modal-title').textContent = isPg?'PG席情報':'予約情報';
  document.getElementById('modal-info').textContent = (show?show.label:'')+'｜'+sid+(isPg?' [PG席]':'');
  var memoVal = (info && info.memo) ? info.memo : '';
  var cardClass = isPg?'pg-card':'sold-card';

  // 取消選択済みかチェック
  var alreadyInCancel = selectedSeats.has(sid);
  // btn-deleteとbtn-add-cancelをリセット
  document.getElementById('btn-delete').style.display='block';
  var addCancelBtn2=document.getElementById('btn-add-cancel');
  addCancelBtn2.style.display='block';
  addCancelBtn2.style.background='#FFF5F5';
  addCancelBtn2.style.color='#C62828';
  addCancelBtn2.style.border='1px solid #FFCDD2';
  addCancelBtn2.style.fontWeight='normal';
  addCancelBtn2.onclick=function(){toggleCancelFromModal();};

  // XSS対策：保存された値は信頼できないため必ずescで無害化
  document.getElementById('sold-card-wrap').innerHTML =
    '<div class="'+cardClass+'">'
    +'<p><strong>購入者：</strong>'+esc(info.name)+'</p>'
    +'<p><strong>電話番号：</strong>'+esc(info.tel)+'</p>'
    +'<p><strong>受付：</strong>'+esc(info.staff)+'</p>'
    +(memoVal?'<p><strong>メモ：</strong>'+esc(memoVal)+'</p>':'')
    +'</div>';

  // 「取消対象に追加」ボタン
  var addCancelBtn = document.getElementById('btn-add-cancel');
  if(alreadyInCancel){
    addCancelBtn.textContent = '✓ 取消対象から外す';
    addCancelBtn.style.background = '#E8F5E9';
    addCancelBtn.style.color = '#2E7D32';
    addCancelBtn.style.borderColor = '#A5D6A7';
  } else {
    addCancelBtn.textContent = '🗑 取消対象に追加';
    addCancelBtn.style.background = '#FFF5F5';
    addCancelBtn.style.color = '#C62828';
    addCancelBtn.style.borderColor = '#FFCDD2';
  }

  document.getElementById('form-new').style.display='none';
  document.getElementById('form-sold').style.display='block';
  document.getElementById('modal-overlay').classList.add('open');
}

function openSoldModal(blk,num,sid,isPg){
  openSoldModalWithAction(blk,num,sid);
}

// 取消対象への追加/除外
function toggleCancelFromModal(){
  if(!selSeat) return;
  var sid = selSeat.sid;
  var blk = selSeat.blk;
  if(selectedSeats.has(sid)){
    // 取消対象から外す
    selectedSeats.delete(sid);
    updateSelBar();
    closeModal();
    renderMap();
  } else {
    // 取消対象に追加
    var hasReg=false, hasPgReturn=false;
    selectedSeats.forEach(function(v){if(v.mode==='reg') hasReg=true; if(v.mode==='pg-return') hasPgReturn=true;});
    if(hasReg||hasPgReturn){
      alert('登録待ち・返却待ちの席と取消待ちの席を同時に選択できません。 一度「解除」してからやり直してください。');
      return;
    }
    selectedSeats.set(sid,{blk:blk,num:selSeat.num,sid:sid,mode:'cancel'});
    updateSelBar();
    closeModal();
    renderMap();
  }
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  selSeat = null;
}

// ─────────────────────────────────────────────
//  保存
// ─────────────────────────────────────────────
async function bulkPgReturn(){
  var targets=[];
  selectedSeats.forEach(function(v){if(v.mode==='pg-return')targets.push(v);});
  if(targets.length===0) return;
  if(!confirm(targets.length+'席のPG配分を返却済みに変更しますか？')) return;
  showLoad('最新状態を確認中...');
  try{
    // 同時編集対策：直前にサーバーの最新itemIdを再取得してから更新
    var latestR = await fetchLatestSoldMap();
    showLoad(targets.length+'席を返却済みに変更中...');
    var READONLY_R=['Author','Editor','Created','Modified','ID','GUID','ContentType'];
    function setR2(f,k,v){var n=colMap[k]||k;if(READONLY_R.indexOf(n)<0)f[n]=v;}
    for(var i=0;i<targets.length;i++){
      var t=targets[i];
      var f={Title:showId+'-'+t.sid};
      setR2(f,'公演ID',showId); setR2(f,'座席ID',t.sid);
      setR2(f,'購入者名','返却済'); setR2(f,'電話番号','');
      setR2(f,'席種',getSeatType(t.blk)); setR2(f,'受付','システム');
      var curR=latestR[t.sid];
      if(curR&&curR.itemId){
        await graph(LIST_URL+'/items/'+curR.itemId,'PATCH',{fields:f});
      } else {
        await graph(LIST_URL+'/items','POST',{fields:f});
      }
    }
    selectedSeats.clear();
    document.body.classList.remove('sel-open');
    updateSelBar();
    await loadSeatData();
  }catch(e){alert('エラー: '+e.message);}
  finally{hideLoad();}
}

async function cancelSelected(){
  var targets=[];
  selectedSeats.forEach(function(v){if(v.mode==='cancel')targets.push(v);});
  if(targets.length===0) return;
  if(!confirm(targets.length+'席の予約・配分を取り消しますか？')) return;
  showLoad(targets.length+'席を取り消し中...');
  try{
    for(var i=0;i<targets.length;i++){
      var t=targets[i];
      if(soldMap[t.sid]&&soldMap[t.sid].itemId){
        if(t.blk.role==='pg'){
          // PG席はDELETEせず返却済みに戻す
          var READONLY2=['Author','Editor','Created','Modified','ID','GUID','ContentType'];
          function setC(f,k,v){var n=colMap[k]||k;if(READONLY2.indexOf(n)<0)f[n]=v;}
          var cf={Title:showId+'-'+t.sid};
          setC(cf,'購入者名','返却済'); setC(cf,'電話番号','');
          setC(cf,'受付','システム');
          await graph(LIST_URL+'/items/'+soldMap[t.sid].itemId,'PATCH',{fields:cf});
        } else {
          await graph(LIST_URL+'/items/'+soldMap[t.sid].itemId,'DELETE');
        }
      }
    }
    selectedSeats.clear();
    document.body.classList.remove('sel-open');
    updateSelBar();
    await loadSeatData();
  }catch(e){
    alert('取り消しエラー: '+e.message);
  }finally{
    hideLoad();
  }
}

async function saveSeat(){
  var name   = document.getElementById('inp-name').value.trim();
  var tel    = document.getElementById('inp-tel').value.trim();
  var staffEl = document.getElementById('sel-staff');
  var staffV = staffEl.value;
  var err    = document.getElementById('err-msg');
  err.textContent='';
  if(!name){err.textContent='購入者名を入力してください';return;}
  if(!tel) {err.textContent='電話番号を入力してください';return;}
  if(!staffV){err.textContent='受付を選択してください';return;}

  // 対象座席リスト（登録待ち(reg)モードの席のみ。取消/返却待ちが混じっていても無視する）
  var targets = [];
  if(selectedSeats.size>0){
    selectedSeats.forEach(function(v){ if(v.mode==='reg'||!v.mode) targets.push(v); });
  } else if(selSeat){
    targets.push(selSeat);
  }
  if(targets.length===0) return;

  // 二重チェック（ローカルキャッシュ）
  var dups = [];
  for(var i=0;i<targets.length;i++){
    var _info=soldMap[targets[i].sid];
    if(_info && _info.name!=='返却済') dups.push(targets[i].sid);
  }
  if(dups.length>0){
    err.textContent=dups.join('、')+' はすでに予約済みです。更新してご確認ください。';
    return;
  }

  document.getElementById('btn-save').disabled=true;
  showLoad('最新状態を確認中...');
  var latest;
  try{
    // 同時編集による二重登録防止：保存直前にサーバー最新状態を再確認
    latest = await fetchLatestSoldMap();
  }catch(e){
    err.textContent='最新状態の確認に失敗しました: '+e.message;
    document.getElementById('btn-save').disabled=false;
    hideLoad();
    return;
  }
  var conflicts=[];
  for(var i=0;i<targets.length;i++){
    var li=latest[targets[i].sid];
    if(li && li.name!=='返却済') conflicts.push(targets[i].sid);
  }
  if(conflicts.length>0){
    err.textContent=conflicts.join('、')+' は他の操作により、すでに予約済みになっています。画面を更新してご確認ください。';
    document.getElementById('btn-save').disabled=false;
    hideLoad();
    await loadSeatData();
    return;
  }

  showLoad(targets.length+'席を登録中...');
  try{
    var READONLY=['Author','Editor','Created','Modified','ID','GUID','ContentType'];
    for(var i=0;i<targets.length;i++){
      var t = targets[i];
      var f = {Title: showId+'-'+t.sid};
      var useName  = name;
      var useTel   = tel;
      var useStaff = staffV;
      // PG席は入力値をそのまま使用（デフォルトがPG_CONFIGだが変更可能）
      function setF(fields,key,val){
        var internal = colMap[key]||key;
        if(READONLY.indexOf(internal)<0) fields[internal]=val;
      }
      setF(f,'公演ID', showId);
      setF(f,'座席ID', t.sid);
      setF(f,'購入者名', useName);
      setF(f,'電話番号', useTel);
      setF(f,'席種', getSeatType(t.blk));
      setF(f,'受付', useStaff);
      // 返却済PG席はPATCHで上書き（重複防止、直前に取得した最新itemIdを使用）
      var li2 = latest[t.sid];
      if(li2 && li2.name==='返却済'){
        await graph(LIST_URL+'/items/'+li2.itemId,'PATCH',{fields:f});
      } else {
        await graph(LIST_URL+'/items','POST',{fields:f});
      }
    }
    selectedSeats.clear();
    closeModal();
    await loadSeatData();
  }catch(e){
    err.textContent='登録エラー: '+e.message;
  }finally{
    document.getElementById('btn-save').disabled=false;
    hideLoad();
  }
}

async function deleteSeat(){
  if(!selSeat||!soldMap[selSeat.sid]) return;
  if(!confirm(selSeat.sid+' の予約を取り消しますか？')) return;
  showLoad('取り消し中...');
  try{
    await graph(LIST_URL+'/items/'+soldMap[selSeat.sid].itemId,'DELETE');
    closeModal();
    await loadSeatData();
  }catch(e){
    alert('エラー: '+e.message);
  }finally{
    hideLoad();
  }
}

// ─────────────────────────────────────────────
//  タブ切替
// ─────────────────────────────────────────────
function switchTab(tab){
  var btns = document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  if(tab==='map'){
    btns[0].classList.add('active');
    document.getElementById('seat-map-panel').style.display='block';
    document.getElementById('search-panel').style.display='none';
    if(selectedSeats.size>0) document.getElementById('sel-bar').classList.add('open');
  } else {
    btns[1].classList.add('active');
    document.getElementById('seat-map-panel').style.display='none';
    document.getElementById('search-panel').style.display='block';
    document.getElementById('sel-bar').classList.remove('open');
    setTimeout(function(){document.getElementById('q-name').focus();},100);
  }
}

// ─────────────────────────────────────────────
//  検索
// ─────────────────────────────────────────────
async function doSearch(){
  var qName = document.getElementById('q-name').value.trim();
  var qTel  = document.getElementById('q-tel').value.trim();
  var wrap  = document.getElementById('search-results-wrap');
  if(!qName&&!qTel){wrap.innerHTML='<div class="s-results"><div class="no-r">購入者名または電話番号を入力してください</div></div>';return;}
  wrap.innerHTML='<div class="s-results"><div class="no-r">検索中...</div></div>';
  try{
    var nf = colMap['購入者名']||'購入者名';
    var tf = colMap['電話番号'] ||'電話番号';
    var qnL = qName.toLowerCase();
    var qtL = qTel.toLowerCase();
    // 全件取得してクライアント側でフィルタ（contains検索）
    showLoad('全件取得中...');
    var allItems=[];
    var nextUrl=LIST_URL+'/items?$expand=fields&$top=500';
    while(nextUrl){
      var pageRes=await graph(nextUrl);
      allItems=allItems.concat(pageRes.value);
      nextUrl=pageRes['@odata.nextLink']||null;
    }
    var res = {value: allItems.filter(function(item){
      var f=item.fields;
      var nm=(f[nf]||'').toLowerCase();
      var tl=(f[tf]||'').toLowerCase();
      return (!qnL||nm.includes(qnL))&&(!qtL||tl.includes(qtL));
    })};
    if(!res.value||res.value.length===0){
      wrap.innerHTML='<div class="s-results"><div class="no-r">該当する予約が見つかりませんでした</div></div>';
      return;
    }
    var showMap={};
    for(var i=0;i<SHOWS.length;i++) showMap[SHOWS[i].id]=SHOWS[i].label;
    var rows='';
    for(var i=0;i<res.value.length;i++){
      var f=res.value[i].fields;
      var sid   = f[colMap['座席ID']  ||'座席ID']  ||'';
      var nm    = f[colMap['購入者名']||'購入者名']||'';
      var tel2  = f[colMap['電話番号']||'電話番号']||'';
      var stype = f[colMap['席種']    ||'席種']    ||'';
      var stf   = f[colMap['受付']    ||'受付']    ||'';
      var mm    = f[colMap['メモ']    ||'メモ']    ||'';
      var pid   = f[colMap['公演ID']  ||'公演ID']  ||'';
      var sl    = showMap[pid]||pid;
      var isPg  = (nm===PG_CONFIG.buyerName);
      var bdg   = stype==='SS席'?'bdg-ss':stype==='S席'?'bdg-s':stype==='BOX席'?'bdg-bx':'bdg-pg';
      if(isPg) bdg='bdg-pg';
      // XSS対策：ユーザー入力由来の値は全てescで無害化してから挿入
      rows+='<tr><td>'+esc(sl)+'</td>'
        +'<td><span class="'+bdg+'">'+(isPg?'PG':esc(stype))+'</span></td>'
        +'<td><strong>'+esc(sid)+'</strong></td>'
        +'<td>'+esc(nm)+'</td><td>'+esc(tel2)+'</td><td>'+esc(stf)+'</td><td>'+esc(mm)+'</td></tr>';
    }
    wrap.innerHTML='<div class="s-results"><table>'
      +'<thead><tr><th>公演日</th><th>席種</th><th>座席ID</th><th>購入者名</th><th>電話番号</th><th>受付</th><th>メモ</th></tr></thead>'
      +'<tbody>'+rows+'</tbody></table></div>'
      +'<p style="margin-top:10px;font-size:.82rem;color:#888;padding:0 4px">'+res.value.length+'件見つかりました</p>';
  }catch(e){
    wrap.innerHTML='<div class="s-results"><div class="no-r">検索エラー: '+esc(e.message)+'</div></div>';
  }
}

}
function hideLoad(){document.getElementById('loading').style.display='none';}

});

window.addEventListener('load',function(){
  getMsal().then(function(inst){
    return inst.handleRedirectPromise().then(function(r){
      if(r){account=r.account;onLoggedIn();return;}
      var acc=inst.getAllAccounts();
      if(acc.length>0){account=acc[0];onLoggedIn();}
    }).catch(function(e){console.warn(e);});
  }).catch(function(e){console.warn('MSAL init:',e.message);});
});
