<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せきとりくん KTNワールドドリームサーカス座席管理</title>
<script src="./msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo UI','メイリオ',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}

/* ── ログイン画面 ── */
#login-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
  background:radial-gradient(ellipse at 60% 40%,#2a4a8a 0%,#1a2f5a 50%,#0d1a33 100%);
}
.login-logo{font-size:4rem;margin-bottom:12px;filter:drop-shadow(0 4px 16px #FFD70088)}
.login-title{color:#FFD700;font-size:1.9rem;font-weight:bold;letter-spacing:0.05em;margin-bottom:6px}
.login-sub{color:#8aa4d4;margin-bottom:40px;font-size:0.95rem;letter-spacing:0.1em}
#btn-login{
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#1a2f5a;border:none;padding:14px 48px;
  font-size:1.05rem;font-weight:bold;border-radius:50px;cursor:pointer;
  font-family:inherit;box-shadow:0 4px 24px #FFD70055;
  transition:transform .15s,box-shadow .15s;letter-spacing:0.05em;
}
#btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 32px #FFD70077}

/* ── アプリ画面 ── */
#app-screen{display:none;min-height:100vh}

header{
  background:linear-gradient(90deg,#1a2f5a,#2a4a8a);
  color:white;padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);position:sticky;top:0;z-index:100;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:1.4rem}
.hdr-title{font-size:1.05rem;font-weight:bold;color:#FFD700;letter-spacing:0.04em}
.hdr-right{display:flex;align-items:center;gap:14px;font-size:0.88rem;color:#8aa4d4}
#btn-logout{
  background:transparent;border:1px solid rgba(255,255,255,0.25);
  color:white;padding:5px 16px;border-radius:20px;cursor:pointer;
  font-family:inherit;font-size:0.82rem;transition:background .15s;
}
#btn-logout:hover{background:rgba(255,255,255,0.12)}

/* ── コントロールバー ── */
#controls{
  background:white;padding:12px 20px;
  border-bottom:2px solid #e8eaf0;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.ctrl-label{font-size:0.82rem;font-weight:bold;color:#5a6a8a}
#show-select{
  padding:8px 14px;border:2px solid #2a4a8a;border-radius:8px;
  font-size:0.95rem;font-family:inherit;color:#1a2f5a;min-width:230px;
  background:white;cursor:pointer;
}
#btn-refresh{
  background:#2a4a8a;color:white;border:none;padding:8px 18px;
  border-radius:8px;cursor:pointer;font-family:inherit;font-size:0.88rem;
  transition:background .15s;
}
#btn-refresh:hover{background:#1a2f5a}
#stats{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.stat{padding:5px 14px;border-radius:16px;font-size:0.82rem;font-weight:bold}
.st-ss {background:#FFF8DC;color:#8B6914;border:1px solid #FFE58A}
.st-s  {background:#F0FFF0;color:#2E7D32;border:1px solid #A5D6A7}
.st-box{background:#FFF3E0;color:#E65100;border:1px solid #FFCC80}
.st-tot{background:#1a2f5a;color:white}

/* ── 座席マップ ── */
#seat-map{padding:20px;overflow-x:auto}
.map-inner{min-width:940px}

.stage-bar{
  background:linear-gradient(135deg,#FFD700,#FFA500);
  color:#3E1C00;text-align:center;padding:13px;
  font-size:1.1rem;font-weight:bold;border-radius:10px;
  margin-bottom:20px;letter-spacing:0.15em;
  box-shadow:0 3px 12px rgba(255,180,0,0.35);
}

.section-title{
  display:flex;align-items:center;gap:8px;margin:20px 0 8px;
}
.section-title span{
  background:#1a2f5a;color:white;padding:5px 16px;
  border-radius:20px;font-size:0.82rem;font-weight:bold;letter-spacing:0.05em;
}
.section-title hr{flex:1;border:none;border-top:1px solid #ddd}

.block-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px}
.block{
  background:white;border:1px solid #e0e4f0;border-radius:10px;
  padding:10px;box-shadow:0 1px 6px rgba(0,0,0,0.06);
}
.block-name{font-size:0.75rem;text-align:center;margin-bottom:7px;font-weight:bold}
.block-name.ktn-ss {color:#8B6914}
.block-name.ktn-s  {color:#2E7D32}
.block-name.ktn-box{color:#E65100}
.block-name.ng     {color:#9E9E9E}

.seat-grid{display:grid;gap:3px}
.seat{
  width:40px;height:40px;border-radius:5px;font-size:0.66rem;
  display:flex;align-items:center;justify-content:center;
  text-align:center;overflow:hidden;line-height:1.2;padding:2px;
  cursor:pointer;border:1px solid rgba(0,0,0,0.1);
  font-family:inherit;transition:transform .12s,box-shadow .12s;
  word-break:break-all;
}
.seat:hover:not(.ng){transform:scale(1.18);z-index:10;position:relative;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
.seat.avail-ss {background:#FFFDE7;color:#8B6914}
.seat.avail-s  {background:#F1F8E9;color:#33691E}
.seat.avail-box{background:#FFF3E0;color:#BF360C}
.seat.sold     {background:#E8F5E9;color:#1B5E20;font-size:0.58rem;cursor:pointer}
.seat.ng       {background:#F5F5F5;color:#BDBDBD;cursor:default;border-color:#EEEEEE}

/* ── モーダル ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(10,20,50,0.65);z-index:500;
  align-items:center;justify-content:center;backdrop-filter:blur(2px);
}
#modal-overlay.open{display:flex}
#modal{
  background:white;border-radius:16px;padding:28px;
  width:440px;max-width:95vw;
  box-shadow:0 12px 48px rgba(0,0,0,0.35);
  animation:modalIn .18s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)} to{opacity:1;transform:none}}
#modal h2{color:#1a2f5a;margin-bottom:4px;font-size:1.1rem}
.modal-seat-info{
  color:#666;font-size:0.83rem;margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid #eee;
}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.82rem;font-weight:bold;color:#444;margin-bottom:5px}
.form-group input,.form-group select{
  width:100%;padding:10px 13px;border:2px solid #e0e0e0;
  border-radius:8px;font-size:0.95rem;font-family:inherit;
  transition:border-color .15s;
}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2a4a8a}
.hint{font-size:0.73rem;color:#999;margin-top:3px}

.sold-card{
  background:#F1F8FF;border:1px solid #BBDEFB;border-radius:10px;
  padding:14px;margin-bottom:14px;
}
.sold-card p{font-size:0.88rem;color:#1565C0;margin-bottom:6px}
.sold-card p:last-child{margin-bottom:0}
.sold-card strong{color:#0D47A1}

.modal-btns{display:flex;gap:10px;margin-top:18px}
#btn-save{
  flex:1;background:linear-gradient(135deg,#1a2f5a,#2a4a8a);
  color:white;border:none;padding:12px;border-radius:8px;
  font-size:0.95rem;cursor:pointer;font-family:inherit;font-weight:bold;
  transition:opacity .15s;
}
#btn-save:hover{opacity:.88}
#btn-save:disabled{background:#ccc;cursor:default}
#btn-cancel,#btn-close{
  flex:1;background:#f5f5f5;color:#444;border:1px solid #ddd;
  padding:12px;border-radius:8px;font-size:0.95rem;cursor:pointer;
  font-family:inherit;transition:background .15s;
}
#btn-cancel:hover,#btn-close:hover{background:#eee}
#btn-delete{
  width:100%;background:#FFF5F5;color:#C62828;border:1px solid #FFCDD2;
  padding:10px;border-radius:8px;font-size:0.88rem;cursor:pointer;
  font-family:inherit;margin-bottom:10px;transition:background .15s;
}
#btn-delete:hover{background:#FFEBEE}
.err{color:#C62828;font-size:0.82rem;margin-top:8px;min-height:18px}

/* ── ローディング ── */
#loading{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(15,25,60,0.9);color:white;padding:18px 36px;
  border-radius:12px;font-size:0.95rem;z-index:1000;
  box-shadow:0 4px 24px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-logo">🎪</div>
  <div class="login-title">せきとりくん</div>
  <div class="login-sub">KTNサーカス座席管理システム v.0708.1545</div>
  <button id="btn-login" onclick="login()">Microsoft アカウントでログイン</button>
</div>

<!-- アプリ画面 -->
<div id="app-screen">
  <header>
    <div class="hdr-left">
      <span class="hdr-logo">🎭</span>
      <span class="hdr-title">せきとりくん</span>
    </div>
    <div class="hdr-right">
      <span id="user-name"></span>
      <button id="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div id="controls">
    <span class="ctrl-label">公演：</span>
    <select id="show-select" onchange="onShowChange()">
      <option value="">-- 公演を選択してください --</option>
    </select>
    <button id="btn-refresh" onclick="loadSeatData()">🔄 更新</button>
    <div id="stats">
      <span class="stat st-ss"  id="stat-ss">SS: ―</span>
      <span class="stat st-s"   id="stat-s" >S: ―</span>
      <span class="stat st-box" id="stat-box">BOX: ―</span>
      <span class="stat st-tot" id="stat-tot">販売済: ―</span>
    </div>
  </div>

  <div id="seat-map">
    <div class="map-inner" id="map-inner">
      <p style="color:#aaa;padding:40px;text-align:center">公演を選択してください</p>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">座席予約</h2>
    <div class="modal-seat-info" id="modal-info"></div>
    <!-- 空席フォーム -->
    <div id="form-new">
      <div class="form-group">
        <label>購入者名 <span style="color:red">*</span></label>
        <input type="text" id="inp-name" placeholder="山田 太郎" autocomplete="off">
      </div>
      <div class="form-group">
        <label>電話番号 <span style="color:red">*</span></label>
        <input type="tel" id="inp-tel" placeholder="090-1234-5678" autocomplete="off">
        <div class="hint">ハイフンありで入力してください</div>
      </div>
      <div class="form-group">
        <label>登録者 <span style="color:red">*</span></label>
        <select id="sel-staff"><option value="">-- 選択 --</option></select>
      </div>
      <div class="err" id="err-msg"></div>
      <div class="modal-btns">
        <button id="btn-save" onclick="saveSeat()">✓ 登録する</button>
        <button id="btn-cancel" onclick="closeModal()">キャンセル</button>
      </div>
    </div>
    <!-- 販売済表示 -->
    <div id="form-sold" style="display:none">
      <div class="sold-card">
        <p><strong>購入者：</strong><span id="sold-name"></span></p>
        <p><strong>電話番号：</strong><span id="sold-tel"></span></p>
        <p><strong>登録者：</strong><span id="sold-staff"></span></p>
      </div>
      <button id="btn-delete" onclick="deleteSeat()">🗑 この予約を取り消す</button>
      <div class="modal-btns">
        <button id="btn-close" onclick="closeModal()">閉じる</button>
      </div>
    </div>
  </div>
</div>

<div id="loading">読み込んどるけん、まっとかんね！</div>

<script>
// ─────────────────────────────────────────────
//  設定
// ─────────────────────────────────────────────
const CLIENT_ID  = '83a913fd-37c9-4b45-993a-c8777f55c0b2';
const TENANT_ID  = '0bd1b308-c26d-49bb-acbd-86dd168984f6';
const SP_HOST    = 'ktno365.sharepoint.com';
const SP_SITE    = 'circus2026';
const LIST_NAME  = '座席販売管理';
const SITE_PATH  = `${SP_HOST}:/sites/${SP_SITE}:`;
const LIST_URL   = `https://graph.microsoft.com/v1.0/sites/${SITE_PATH}/lists/${encodeURIComponent(LIST_NAME)}`;

const msalCfg = {
  auth:{
    clientId: CLIENT_ID,
    authority:`https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: "https://ktncircus.github.io/circus-seats/circus-seats.html",
  },
  cache:{cacheLocation:'sessionStorage'}
};
const SCOPES = ['https://graph.microsoft.com/Sites.ReadWrite.All'];

// ─────────────────────────────────────────────
//  公演リスト生成
// ─────────────────────────────────────────────
const WD = ['日','月','火','水','木','金','土'];
const SHOWS = (()=>{
  const list=[];
  const e=new Date(2027,0,31);
  for(let d=new Date(2026,10,21);d<=e;d.setDate(d.getDate()+1)){
    const wd=d.getDay();
    const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const lbl=`${pad(d.getMonth()+1)}/${pad(d.getDate())}（${WD[wd]}）`;
    if(wd===5) list.push({id:`${ds}-1900`,label:`${lbl} 19:00`});
    else if(wd===6||wd===0){
      list.push({id:`${ds}-1400`,label:`${lbl} 14:00`});
      list.push({id:`${ds}-1800`,label:`${lbl} 18:00`});
    }
  }
  return list;
})();
function pad(n){return String(n).padStart(2,'0')}
function p3(n){return String(n).padStart(3,'0')}

// ─────────────────────────────────────────────
//  座席定義
// ─────────────────────────────────────────────
const rng=(s,e)=>Array.from({length:e-s+1},(_,i)=>s+i);
const BOX_KTN_SET = new Set([...rng(1,10),...rng(21,30)]);

const BLOCKS=[
  // BOX
  {id:'BOX_F', label:'前列 1〜10番（KTN）',  type:'box',ktn:true, seats:rng(1,10), pr:10},
  {id:'BOX_N1',label:'11〜20番（管理外）',    type:'box',ktn:false,seats:rng(11,20),pr:10},
  {id:'BOX_R', label:'後列 21〜30番（KTN）',  type:'box',ktn:true, seats:rng(21,30),pr:10},
  {id:'BOX_N2',label:'31〜88番（管理外）',    type:'box',ktn:false,seats:rng(31,88),pr:10},
  // SS KTN
  {id:'SS_OH', label:'おブロック（KTN 33席）',type:'ss', ktn:true, seats:rng(1,33), pr:6, pfx:'お'},
  {id:'SS_E',  label:'えブロック（KTN 63席）',type:'ss', ktn:true, seats:rng(1,63), pr:9, pfx:'え'},
  {id:'SS_A',  label:'あブロック（KTN 33席）',type:'ss', ktn:true, seats:rng(1,33), pr:6, pfx:'あ'},
  // SS 非KTN
  {id:'SS_U',  label:'うブロック（管理外）',  type:'ss', ktn:false,seats:rng(1,63), pr:9, pfx:'う'},
  {id:'SS_I',  label:'いブロック（管理外）',  type:'ss', ktn:false,seats:rng(1,68), pr:9, pfx:'い'},
  // S
  {id:'S_KI',  label:'きブロック（KTN 66席）',type:'s',  ktn:true, seats:rng(1,66), pr:11,pfx:'き'},
  {id:'S_KA',  label:'かブロック（管理外）',  type:'s',  ktn:false,seats:rng(1,66), pr:11,pfx:'か'},
];

function getSeatId(blk,num){
  if(blk.id.startsWith('BOX')) return `BOX-${p3(num)}`;
  const pre = blk.id.startsWith('S_') ? 'S' : 'SS';
  return `${pre}-${blk.pfx}-${p3(num)}`;
}
function getSeatType(blk){
  if(blk.id.startsWith('BOX')) return 'BOX席';
  if(blk.id.startsWith('S_'))  return 'S席';
  return 'SS席';
}

// ─────────────────────────────────────────────
//  状態
// ─────────────────────────────────────────────
let account=null, showId=null;
let soldMap={};    // seatId→{name,tel,staff,itemId}
let colMap={};     // displayName→internalName
let staffList=[];

// ─────────────────────────────────────────────
//  認証
// ─────────────────────────────────────────────
async function login(){
  const btn = document.getElementById('btn-login');
  const orig = btn.textContent;
  btn.textContent = '処理中ばい...';
  btn.disabled = true;
  try{
    const inst = await getMsal();
    const r = await inst.loginPopup({scopes:SCOPES});
    account = r.account;
    onLoggedIn();
  } catch(e) {
    btn.textContent = orig;
    btn.disabled = false;
    if (e.message && e.message.includes('popup_window_error')) {
      alert('ポップアップがブロックされました。\nブラウザのアドレスバー右側にあるポップアップブロックのアイコンをクリックして許可してください。');
    } else if (e.message && e.message.includes('user_cancelled')) {
      // キャンセルは何もしない
    } else {
      alert('エラー内容: ' + (e.message || JSON.stringify(e)));
    }
  }
}
function logout(){msal_.logoutPopup({account})}

async function getToken(){
  const inst = await getMsal();
  try{
    return (await inst.acquireTokenSilent({scopes:SCOPES,account})).accessToken;
  }catch{
    return (await inst.acquireTokenPopup({scopes:SCOPES})).accessToken;
  }
}

async function graph(url,method='GET',body=null){
  const tok=await getToken();
  const opt={method,headers:{
    Authorization:`Bearer ${tok}`,
    'Content-Type':'application/json',
    'Prefer':'HonorNonIndexedQueriesWarningMayFailRandomly'
  }};
  if(body) opt.body=JSON.stringify(body);
  const res=await fetch(url,opt);
  if(!res.ok){const t=await res.text();throw new Error(`GraphAPI ${res.status}: ${t}`)}
  return method==='DELETE'?null:res.json();
}

// ─────────────────────────────────────────────
//  初期化
// ─────────────────────────────────────────────
async function onLoggedIn(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('user-name').textContent=account.name;
  showLoad('初期化中...');
  try{
    await loadColMap();
    await loadStaff();
    buildShowSel();
    buildStaffSel();
  }catch(e){alert('初期化エラー: '+e.message);}
  finally{hideLoad()}
}

async function loadColMap(){
  const res=await graph(`${LIST_URL}/columns`);
  colMap={};
  for(const c of res.value) colMap[c.displayName]=c.name;
}

async function loadStaff(){
  const res=await graph(`${LIST_URL}/columns`);
  // displayName または name で「登録者」列を探す
  const col=res.value.find(c=>
    c.displayName==='登録者' ||
    c.name==='登録者' ||
    (c.displayName && c.displayName.includes('登録'))
  );
  if(col){
    // choice列の構造はAPIバージョンにより異なる
    const choices = col?.choice?.choices || col?.choices || [];
    staffList = choices;
    console.log('登録者の選択肢:', staffList);
  } else {
    console.warn('「登録者」列が見つかりませんでした。列一覧:', res.value.map(c=>c.displayName));
  }
}

function buildShowSel(){
  const sel=document.getElementById('show-select');
  for(const s of SHOWS){
    const o=document.createElement('option');
    o.value=s.id; o.textContent=s.label; sel.appendChild(o);
  }
}
function buildStaffSel(){
  const sel=document.getElementById('sel-staff');
  if(staffList.length===0){
    // 手動入力に切り替え
    const inp=document.createElement('input');
    inp.type='text'; inp.id='sel-staff';
    inp.placeholder='登録者名を入力';
    inp.style.cssText='width:100%;padding:10px 13px;border:2px solid #e0e0e0;border-radius:8px;font-size:.95rem;font-family:inherit;';
    sel.parentNode.replaceChild(inp,sel);
    console.warn('登録者の選択肢が取得できなかったため手動入力に切り替えました');
    return;
  }
  for(const n of staffList){
    const o=document.createElement('option');
    o.value=n; o.textContent=n; sel.appendChild(o);
  }
}

// ─────────────────────────────────────────────
//  データ読み込み
// ─────────────────────────────────────────────
async function onShowChange(){
  showId=document.getElementById('show-select').value;
  if(!showId) return;
  await loadSeatData();
}

async function loadSeatData(){
  if(!showId) return;
  showLoad('座席データを読み込み中ばい...');
  try{
    const fld=colMap['公演ID']||'公演ID';
    const url=`${LIST_URL}/items?$expand=fields&$filter=fields/${fld} eq '${showId}'&$top=500`;
    const res=await graph(url);
    soldMap={};
    for(const item of res.value){
      const f=item.fields;
      const sid=f[colMap['座席ID']||'座席ID'];
      if(sid) soldMap[sid]={
        name: f[colMap['購入者名']||'購入者名']||'',
        tel:  f[colMap['電話番号']||'電話番号']||'',
        staff:f[colMap['登録者']  ||'登録者']  ||'',
        itemId:item.id
      };
    }
    renderMap(); updateStats();
  }catch(e){alert('読み込みエラー: '+e.message);}
  finally{hideLoad()}
}

// ─────────────────────────────────────────────
//  座席マップ描画
// ─────────────────────────────────────────────
function renderMap(){
  const wrap=document.getElementById('map-inner');
  wrap.innerHTML='';

  // ステージ
  const stg=document.createElement('div');
  stg.className='stage-bar'; stg.textContent='◆  S T A G E  ◆';
  wrap.appendChild(stg);

  const SECS=[
    {title:'🟠 BOX指定席',bids:['BOX_F','BOX_N1','BOX_R','BOX_N2']},
    {title:'🟡 SS指定席', bids:['SS_OH','SS_E','SS_A','SS_U','SS_I']},
    {title:'🟢 S指定席',  bids:['S_KI','S_KA']},
  ];

  for(const sec of SECS){
    const ti=document.createElement('div');
    ti.className='section-title';
    ti.innerHTML=`<hr><span>${sec.title}</span><hr>`;
    wrap.appendChild(ti);
    const row=document.createElement('div');
    row.className='block-row';
    for(const bid of sec.bids){
      const blk=BLOCKS.find(b=>b.id===bid);
      if(blk) row.appendChild(renderBlock(blk));
    }
    wrap.appendChild(row);
  }
}

function renderBlock(blk){
  const div=document.createElement('div');
  div.className='block';
  const h=document.createElement('div');
  h.className=`block-name ${blk.ktn ? 'ktn-'+blk.type : 'ng'}`;
  h.textContent=blk.label;
  div.appendChild(h);
  const grid=document.createElement('div');
  grid.className='seat-grid';
  grid.style.gridTemplateColumns=`repeat(${blk.pr},40px)`;
  for(const num of blk.seats){
    const sid=getSeatId(blk,num);
    const btn=document.createElement('button');
    if(!blk.ktn){
      btn.className='seat ng';
      btn.textContent=num;
      btn.title=`${sid}（管理外）`;
    } else if(soldMap[sid]){
      btn.className='seat sold';
      btn.textContent=soldMap[sid].name;
      btn.title=`${sid}: ${soldMap[sid].name}`;
      btn.onclick=()=>openModal(blk,num,sid,true);
    } else {
      btn.className=`seat avail-${blk.type}`;
      btn.textContent=num;
      btn.title=`${sid}（空席）`;
      btn.onclick=()=>openModal(blk,num,sid,false);
    }
    grid.appendChild(btn);
  }
  div.appendChild(grid);
  return div;
}

function updateStats(){
  let ss=0,s=0,box=0;
  for(const sid of Object.keys(soldMap)){
    if(sid.startsWith('SS-')) ss++;
    else if(sid.startsWith('S-')) s++;
    else if(sid.startsWith('BOX-')) box++;
  }
  document.getElementById('stat-ss').textContent =`SS: ${ss}/129`;
  document.getElementById('stat-s').textContent  =`S: ${s}/66`;
  document.getElementById('stat-box').textContent=`BOX: ${box}/20`;
  document.getElementById('stat-tot').textContent=`販売済: ${ss+s+box}/215`;
}

// ─────────────────────────────────────────────
//  モーダル
// ─────────────────────────────────────────────
let selSeat=null;

function openModal(blk,num,sid,isSold){
  selSeat={blk,num,sid,isSold};
  const show=SHOWS.find(s=>s.id===showId);
  document.getElementById('modal-title').textContent=isSold?'予約情報':'座席を予約';
  document.getElementById('modal-info').textContent=
    `${show?.label||''} ｜ ${sid}（${getSeatType(blk)}）`;
  if(isSold){
    const info=soldMap[sid];
    document.getElementById('sold-name').textContent=info.name;
    document.getElementById('sold-tel').textContent=info.tel;
    document.getElementById('sold-staff').textContent=info.staff;
    document.getElementById('form-new').style.display='none';
    document.getElementById('form-sold').style.display='block';
  } else {
    document.getElementById('inp-name').value='';
    document.getElementById('inp-tel').value='';
    document.getElementById('sel-staff').value='';
    document.getElementById('err-msg').textContent='';
    document.getElementById('form-new').style.display='block';
    document.getElementById('form-sold').style.display='none';
  }
  document.getElementById('modal-overlay').classList.add('open');
  if(!isSold) setTimeout(()=>document.getElementById('inp-name').focus(),100);
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  selSeat=null;
}

async function saveSeat(){
  const name=document.getElementById('inp-name').value.trim();
  const tel=document.getElementById('inp-tel').value.trim();
  const staff=document.getElementById('sel-staff').value;
  const err=document.getElementById('err-msg');
  err.textContent='';
  if(!name){err.textContent='購入者名を入力してください';return}
  if(!tel) {err.textContent='電話番号を入力してください';return}
  if(!staff){err.textContent='登録者を選択してください';return}
  if(soldMap[selSeat.sid]){
    err.textContent='この座席は他の方が先に予約しました。更新してご確認ください。';return;
  }
  document.getElementById('btn-save').disabled=true;
  showLoad('登録中...');
  try{
    const f={Title:`${showId}-${selSeat.sid}`};
    f[colMap['公演ID']  ||'公演ID']  =showId;
    f[colMap['座席ID']  ||'座席ID']  =selSeat.sid;
    f[colMap['購入者名']||'購入者名']=name;
    f[colMap['電話番号']||'電話番号']=tel;
    f[colMap['席種']    ||'席種']    =getSeatType(selSeat.blk);
    f[colMap['登録者']  ||'登録者']  =staff;
    await graph(`${LIST_URL}/items`,'POST',{fields:f});
    closeModal();
    await loadSeatData();
  }catch(e){
    err.textContent='登録エラー: '+e.message;
  }finally{
    document.getElementById('btn-save').disabled=false;
    hideLoad();
  }
}

async function deleteSeat(){
  if(!confirm(`${selSeat.sid} の予約を取り消しますか？よかとね？`)) return;
  const info=soldMap[selSeat.sid];
  if(!info) return;
  showLoad('取り消し中...');
  try{
    await graph(`${LIST_URL}/items/${info.itemId}`,'DELETE');
    closeModal(); await loadSeatData();
  }catch(e){alert('エラー: '+e.message);}
  finally{hideLoad()}
}

// ─────────────────────────────────────────────
//  ユーティリティ
// ─────────────────────────────────────────────
function showLoad(msg){document.getElementById('loading').textContent=msg;document.getElementById('loading').style.display='block'}
function hideLoad(){document.getElementById('loading').style.display='none'}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target.id==='modal-overlay')closeModal();
});

// ─────────────────────────────────────────────
//  起動
// ─────────────────────────────────────────────
// msal_ を遅延初期化（ボタン押下時に初めて生成）
let msal_;

async function getMsal() {
  if (msal_) return msal_;
  let tries = 0;
  while (typeof msal === 'undefined' && tries < 50) {
    await new Promise(r => setTimeout(r, 100));
    tries++;
  }
  if (typeof msal === 'undefined') {
    throw new Error('MSALライブラリが読み込めませんでした。ページを更新してください。');
  }
  msal_ = new msal.PublicClientApplication(msalCfg);
  await msal_.initialize();
  return msal_;
}

// すでにログイン済みか確認
window.addEventListener('load', async () => {
  try {
    const inst = await getMsal();
    try {
      const r = await inst.handleRedirectPromise();
      if (r) { account = r.account; onLoggedIn(); return; }
    } catch(e) { console.warn(e); }
    const acc = inst.getAllAccounts();
    if (acc.length > 0) { account = acc[0]; onLoggedIn(); }
  } catch(e) { console.warn('自動ログイン確認失敗:', e.message); }
});
</script>
